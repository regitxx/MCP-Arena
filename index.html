<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Arena - AI Agent Evaluation Sandbox</title>
  <meta name="description" content="Watch AI agents navigate digital and physical worlds through the Model Context Protocol. Same interface, different realities.">
  <style>
    /* ============ RESET & BASE ============ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050510;
      --bg-panel: #0d1117;
      --bg-card: #111827;
      --bg-hover: #1a2332;
      --border: #1e293b;
      --border-light: #2d3a4d;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-bright: #f8fafc;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --cyan: #22d3ee;
      --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 10px;
      --radius-sm: 6px;
    }
    html { font-size: 14px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #app { min-height: 100vh; }

    /* ============ LANDING PAGE ============ */
    .landing {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 40px;
    }
    .landing-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .logo-icon {
      font-size: 40px;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }
    .landing-header h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #6366f1, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 1.1rem;
      color: var(--text-dim);
      font-weight: 500;
    }
    .tagline {
      font-size: 1.15rem;
      color: var(--text-dim);
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.7;
    }
    .highlight {
      color: var(--cyan);
      font-weight: 600;
    }

    /* Architecture Banner */
    .architecture-banner {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(34,211,238,0.05));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 48px;
    }
    .arch-flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .arch-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 0.85rem;
      font-family: var(--font-mono);
      color: var(--text);
    }
    .arch-emoji { font-size: 1.5rem; }
    .arch-arrow {
      color: var(--accent);
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.9rem;
    }
    .arch-plus {
      color: var(--text-dim);
      font-size: 1.2rem;
      font-weight: 700;
    }

    /* Task Cards */
    .tasks-section h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: var(--text-bright);
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: all 0.2s;
      cursor: default;
    }
    .task-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
      transform: translateY(-2px);
    }
    .task-card-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .task-card h3 {
      font-size: 1.2rem;
      color: var(--text-bright);
      margin-bottom: 8px;
    }
    .task-card p {
      color: var(--text-dim);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .task-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .badge-medium { border-color: var(--warning); color: var(--warning); }
    .badge-hard { border-color: var(--error); color: var(--error); }
    .badge-expert { border-color: var(--accent); color: var(--accent); }
    .badge-time { border-color: var(--cyan); color: var(--cyan); }

    .run-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .run-btn:hover {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    /* Mini Leaderboard */
    .mini-leaderboard { margin-bottom: 48px; }
    .mini-leaderboard h2 { font-size: 1.3rem; margin-bottom: 16px; color: var(--text-bright); }
    .lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .lb-table th {
      text-align: left;
      padding: 10px 12px;
      color: var(--text-dim);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }
    .lb-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .model-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .score-cell { font-family: var(--font-mono); font-weight: 600; color: var(--success); }

    /* Footer */
    .landing-footer {
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .footer-sub { margin-top: 4px; font-size: 0.8rem; opacity: 0.6; }

    /* ============ ARENA VIEW ============ */
    .arena {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .arena-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .arena-title {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .arena-icon { font-size: 1.4rem; }
    .arena-title h2 { font-size: 1.1rem; font-weight: 600; }
    .arena-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .control-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      cursor: pointer;
    }
    .primary-btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .primary-btn:hover { box-shadow: 0 2px 12px var(--accent-glow); }
    .danger-btn {
      background: var(--error);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .hidden { display: none !important; }

    /* Arena Layout */
    .arena-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .arena-left {
      flex: 0 0 62%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .arena-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-left: 1px solid var(--border);
    }

    /* Panels */
    .panel {
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg-panel);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
    }
    .status-running { border-color: var(--warning); color: var(--warning); animation: pulse 1.5s infinite; }
    .status-complete { border-color: var(--success); color: var(--success); }

    /* Canvas */
    .simulation-panel { flex: 1; min-height: 0; }
    #simCanvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Scores */
    .scores-panel { flex-shrink: 0; }
    .scores-grid {
      display: flex;
      gap: 0;
      padding: 0;
    }
    .score-card {
      flex: 1;
      padding: 12px 14px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .score-card:last-child { border-right: none; }
    .score-label {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .score-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text-bright);
    }
    .score-value.big {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--success), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .grade-a { --c: var(--success); }
    .grade-b { --c: var(--cyan); }
    .grade-c { --c: var(--warning); }
    .grade-d, .grade-f { --c: var(--error); }
    .safety-ok { color: var(--success); }
    .score-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .time-fill { background: var(--cyan); }
    .final-score { background: rgba(99,102,241,0.08); }
    .score-reveal { animation: scoreReveal 0.6s ease; }

    /* Thinking Panel */
    .thinking-panel { flex-shrink: 0; min-height: 70px; }
    .model-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(99,102,241,0.15);
      color: var(--accent);
      font-family: var(--font-mono);
    }
    .thinking-text {
      padding: 10px 14px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
    }
    .thinking-placeholder { color: var(--text-dim); font-style: italic; }
    .thinking-step {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .step-badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-family: var(--font-mono);
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .thinking-content { color: var(--text); }

    /* Activity Log */
    .activity-panel {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .activity-log {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      scroll-behavior: smooth;
    }
    .call-counter {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    .log-placeholder {
      color: var(--text-dim);
      font-style: italic;
      padding: 14px;
      font-size: 0.85rem;
    }
    .log-entry {
      padding: 8px 10px;
      margin-bottom: 4px;
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--border);
      background: var(--bg-card);
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .log-pending { border-left-color: var(--warning); }
    .log-success { border-left-color: var(--success); }
    .log-error { border-left-color: var(--error); }
    .log-header {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .log-icon { font-size: 0.9rem; }
    .log-server {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
    }
    .log-separator { color: var(--text-dim); }
    .log-tool {
      font-family: var(--font-mono);
      color: var(--text-bright);
      font-weight: 600;
    }
    .log-status {
      margin-left: auto;
      font-size: 0.8rem;
    }
    .log-status.pending { color: var(--warning); }
    .log-status.success { color: var(--success); }
    .log-status.error { color: var(--error); }
    .log-duration {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
      margin-left: 4px;
    }
    .log-params {
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .param-key { color: var(--cyan); }
    .param-eq { color: var(--text-dim); margin: 0 2px; }
    .param-val { color: var(--warning); }
    .param-empty { color: var(--text-dim); }
    .log-result {
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      border-top: 1px solid var(--border);
      padding-top: 4px;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Servers Panel */
    .servers-panel { flex-shrink: 0; }
    .server-list { padding: 8px 14px; }
    .server-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.8rem;
    }
    .server-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .server-dot.active { background: var(--success); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .server-name {
      font-family: var(--font-mono);
      color: var(--text-bright);
      font-weight: 600;
    }
    .server-desc { color: var(--text-dim); }

    /* ============ ANIMATIONS ============ */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes scoreReveal {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 900px) {
      .arena-body { flex-direction: column; }
      .arena-left { flex: none; height: 50%; }
      .arena-right { border-left: none; border-top: 1px solid var(--border); }
      .arena-header { flex-wrap: wrap; }
      .arena-controls { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
