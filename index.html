<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Arena — Social Robotics Brain</title>
  <meta name="description" content="The world's first MCP-based social robot brain: evaluate, optimize, and run AI brains for elderly care through emotion intelligence, companion quality, cognitive reasoning, speech, and multilingual capabilities.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050510;
      --bg-panel: #0d1117;
      --bg-card: #111827;
      --bg-hover: #1a2332;
      --border: #1e293b;
      --border-light: #2d3a4d;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-bright: #f8fafc;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --cyan: #22d3ee;
      --pink: #ec4899;
      --orange: #f97316;
      --purple: #a855f7;
      --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }
    html { font-size: 14px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    #app { min-height: 100vh; }

    /* ============ MODE SWITCHER ============ */
    .mode-switcher {
      display: flex; gap: 0; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 999px; overflow: hidden; padding: 3px;
    }
    .mode-btn {
      padding: 0.4rem 1.2rem; border: none; background: transparent; color: var(--text-dim);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; border-radius: 999px; transition: all 0.2s;
    }
    .mode-btn.active { background: var(--accent); color: white; }
    .mode-btn:hover:not(.active) { color: var(--text); }

    /* ============ LANDING ============ */
    .landing { min-height: 100vh; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .landing-header { text-align: center; padding: 3rem 0 2rem; }
    .landing-header h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; }
    .landing-header h1 .gradient {
      background: linear-gradient(135deg, var(--accent), var(--pink), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .landing-header .subtitle { color: var(--text-dim); font-size: 1.15rem; margin-top: 0.75rem; max-width: 700px; margin-left: auto; margin-right: auto; }
    .landing-header .demo-badge {
      display: inline-block; margin-top: 1rem; padding: 0.3rem 1rem; background: rgba(249, 115, 22, 0.15);
      border: 1px solid rgba(249, 115, 22, 0.4); border-radius: 999px; color: var(--orange); font-size: 0.8rem; font-weight: 600;
    }

    /* MCP Architecture Banner */
    .mcp-banner {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(236,72,153,0.06));
      border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 2rem;
      margin: 1.5rem 0; display: flex; gap: 1.5rem; align-items: flex-start;
    }
    .mcp-banner .icon { font-size: 2rem; flex-shrink: 0; }
    .mcp-banner h3 { color: var(--text-bright); font-size: 1rem; margin-bottom: 0.3rem; }
    .mcp-banner p { color: var(--text-dim); font-size: 0.85rem; line-height: 1.6; }
    .mcp-servers { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .mcp-server-tag {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.25rem 0.7rem; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 999px; font-size: 0.75rem; color: var(--cyan); font-family: var(--font-mono);
    }

    /* Task Cards */
    .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.25rem; margin: 1.5rem 0; }
    .task-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; cursor: pointer; transition: all 0.2s;
    }
    .task-card:hover { border-color: var(--accent); background: var(--bg-hover); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.1); }
    .task-card .card-top { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .task-card .card-icon { font-size: 1.5rem; }
    .task-card .card-title { font-weight: 700; color: var(--text-bright); font-size: 1.05rem; }
    .task-card .card-desc { color: var(--text-dim); font-size: 0.85rem; line-height: 1.5; margin-bottom: 0.75rem; }
    .task-card .card-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .task-card .meta-tag {
      font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .meta-tag.difficulty-Medium { background: rgba(245,158,11,0.15); color: var(--warning); }
    .meta-tag.difficulty-Hard { background: rgba(239,68,68,0.15); color: var(--error); }
    .meta-tag.difficulty-Expert { background: rgba(168,85,247,0.15); color: var(--purple); }
    .meta-tag.category { background: rgba(99,102,241,0.12); color: var(--accent); }

    /* Model Selector */
    .controls-bar {
      display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.5rem; margin: 1.5rem 0;
    }
    .controls-bar label { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .controls-bar select, .controls-bar input {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); padding: 0.5rem 0.75rem; font-size: 0.85rem; font-family: var(--font-mono);
    }

    /* ============ ARENA DASHBOARD ============ */
    .arena { display: grid; grid-template-columns: 1fr 380px; grid-template-rows: auto 1fr auto; gap: 0; min-height: 100vh; }
    .arena-topbar {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem; background: var(--bg-panel); border-bottom: 1px solid var(--border);
    }
    .arena-topbar .back-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-dim); padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.8rem; transition: all 0.15s;
    }
    .arena-topbar .back-btn:hover { border-color: var(--accent); color: var(--text); }
    .arena-topbar .task-name { font-weight: 700; color: var(--text-bright); font-size: 1.05rem; }
    .arena-topbar .model-badge { margin-left: auto; font-family: var(--font-mono); font-size: 0.8rem; padding: 0.3rem 0.7rem; border-radius: 999px; }
    .arena-topbar .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .arena-main { padding: 1rem 1.5rem; overflow-y: auto; max-height: calc(100vh - 52px - 80px); }

    .thinking-box {
      background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius);
      padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: var(--text-dim);
      font-style: italic; transition: all 0.3s; min-height: 2.5rem;
    }
    .thinking-box .label { color: var(--accent); font-weight: 600; font-style: normal; margin-right: 0.4rem; }

    .score-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .score-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 0.75rem 1rem; text-align: center;
    }
    .score-card .sc-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .score-card .sc-value { font-size: 1.5rem; font-weight: 800; color: var(--text-bright); margin-top: 0.2rem; font-family: var(--font-mono); }
    .score-card .sc-value.grade-A { color: var(--success); }
    .score-card .sc-value.grade-B { color: var(--cyan); }
    .score-card .sc-value.grade-C { color: var(--warning); }
    .score-card .sc-value.grade-D { color: var(--orange); }
    .score-card .sc-value.grade-F { color: var(--error); }

    .radar-section { margin-bottom: 1rem; }
    .radar-section h3 { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .emotion-bars { display: flex; flex-direction: column; gap: 0.4rem; }
    .emotion-bar { display: flex; align-items: center; gap: 0.5rem; }
    .emotion-bar .em-icon { width: 1.5rem; text-align: center; }
    .emotion-bar .em-label { width: 80px; font-size: 0.75rem; color: var(--text-dim); }
    .emotion-bar .em-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .emotion-bar .em-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .emotion-bar .em-value { width: 35px; text-align: right; font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-dim); }

    .dimension-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
    .dim-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .dim-item .dim-icon { font-size: 1.2rem; }
    .dim-item .dim-info { flex: 1; }
    .dim-item .dim-name { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; }
    .dim-item .dim-score { font-size: 1.1rem; font-weight: 700; font-family: var(--font-mono); }

    .arena-log {
      background: var(--bg-panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; max-height: calc(100vh - 52px);
    }
    .arena-log .log-header {
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 0.85rem; color: var(--text-dim);
      display: flex; align-items: center; justify-content: space-between;
    }
    .arena-log .log-header .count { font-family: var(--font-mono); color: var(--accent); }
    .arena-log .log-entries { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .log-entry {
      padding: 0.5rem 0.6rem; margin-bottom: 0.3rem; border-radius: var(--radius-sm);
      font-size: 0.78rem; border: 1px solid transparent; transition: all 0.15s;
    }
    .log-entry.thinking { color: var(--text-dim); font-style: italic; background: rgba(99,102,241,0.04); }
    .log-entry.tool-start { background: rgba(34,211,238,0.04); }
    .log-entry.tool-complete { background: rgba(34,211,238,0.06); border-color: rgba(34,211,238,0.1); }
    .log-entry.tool-error { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.15); }
    .log-entry .tool-name { font-family: var(--font-mono); color: var(--cyan); font-weight: 600; }
    .log-entry .server-name { color: var(--pink); font-family: var(--font-mono); font-size: 0.7rem; }
    .log-entry .tool-icon { margin-right: 0.3rem; }
    .log-entry .result-msg { color: var(--text-dim); font-size: 0.72rem; margin-top: 0.2rem; display: block; }
    .log-entry .duration { color: var(--text-dim); font-family: var(--font-mono); font-size: 0.68rem; }

    .arena-bottom {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 1rem;
      padding: 0.5rem 1.5rem; background: var(--bg-panel); border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text-dim);
    }
    .arena-bottom .progress-bar { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .arena-bottom .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }

    .result-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5,5,16,0.85); display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(8px);
    }
    .result-card {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 2.5rem; max-width: 550px; width: 90%; text-align: center;
    }
    .result-card .big-score { font-size: 4rem; font-weight: 900; font-family: var(--font-mono); }
    .result-card .big-grade { font-size: 2rem; font-weight: 800; margin-top: 0.2rem; }
    .result-card .breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
    .result-card .bd-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
    .result-card .bd-value { font-size: 1.4rem; font-weight: 700; font-family: var(--font-mono); color: var(--text-bright); }
    .result-card .btn-row { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; }
    .btn {
      padding: 0.6rem 1.5rem; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.85rem;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #5558e6; }
    .btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }

    .run-btn {
      background: linear-gradient(135deg, var(--accent), var(--pink));
      color: white; border: none; padding: 0.8rem 2rem; border-radius: var(--radius);
      font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s;
    }
    .run-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .lb-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .lb-table th { text-align: left; padding: 0.6rem 0.8rem; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .lb-table td { padding: 0.6rem 0.8rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    .lb-table tr:hover td { background: var(--bg-hover); }
    .lb-rank { font-weight: 700; color: var(--accent); }

    .landing-footer { text-align: center; padding: 2rem 0; color: var(--text-dim); font-size: 0.8rem; }
    .landing-footer a { color: var(--cyan); text-decoration: none; }

    /* ============ BRAIN CONVERSATION MODE ============ */
    .brain-view {
      display: grid; grid-template-columns: 1fr 340px;
      min-height: 100vh;
    }
    .brain-topbar {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem; background: var(--bg-panel); border-bottom: 1px solid var(--border);
    }
    .brain-topbar .brain-title {
      font-weight: 700; color: var(--text-bright); font-size: 1.05rem;
    }
    .brain-topbar .brain-status {
      margin-left: auto; display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; color: var(--text-dim);
    }
    .brain-topbar .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite;
    }

    /* Chat area */
    .brain-chat {
      display: flex; flex-direction: column; height: calc(100vh - 52px);
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    }
    .chat-msg {
      max-width: 80%; padding: 0.85rem 1.1rem; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-msg.user {
      align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px;
    }
    .chat-msg.bot {
      align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .chat-msg.system {
      align-self: center; background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.15);
      color: var(--text-dim); font-size: 0.8rem; font-style: italic; max-width: 90%;
    }
    .chat-msg .msg-meta {
      display: flex; gap: 0.5rem; margin-top: 0.4rem; font-size: 0.68rem; color: var(--text-dim); opacity: 0.7;
    }
    .chat-msg.bot .msg-meta { color: var(--text-dim); }
    .chat-msg.user .msg-meta { color: rgba(255,255,255,0.6); }

    .chat-typing {
      align-self: flex-start; padding: 0.5rem 1rem; color: var(--text-dim); font-size: 0.8rem; font-style: italic;
    }
    .chat-typing .dots { display: inline-block; }
    .chat-typing .dots span { animation: blink 1.4s infinite; opacity: 0; }
    .chat-typing .dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    /* Chat input */
    .chat-input-bar {
      padding: 0.75rem 1.5rem; border-top: 1px solid var(--border); background: var(--bg-panel);
      display: flex; gap: 0.75rem; align-items: center;
    }
    .chat-input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: 0.7rem 1rem; font-size: 0.9rem; font-family: var(--font-sans);
      outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--text-dim); }
    .chat-send {
      background: var(--accent); color: white; border: none; border-radius: var(--radius);
      padding: 0.7rem 1.2rem; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
    }
    .chat-send:hover { background: #5558e6; }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Brain sidebar */
    .brain-sidebar {
      background: var(--bg-panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; height: calc(100vh - 52px); overflow-y: auto;
    }
    .sidebar-section {
      padding: 1rem; border-bottom: 1px solid var(--border);
    }
    .sidebar-section h4 {
      font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem;
    }

    /* Emotion state display */
    .emotion-display {
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .emotion-primary {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 1.1rem; font-weight: 700;
    }
    .emotion-primary .emo-emoji { font-size: 1.5rem; }
    .emotion-dims { display: flex; flex-direction: column; gap: 0.35rem; }
    .emotion-dim {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem;
    }
    .emotion-dim .dim-label { width: 85px; color: var(--text-dim); }
    .emotion-dim .dim-bar { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .emotion-dim .dim-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .emotion-dim .dim-val { width: 30px; text-align: right; font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); }

    /* Memory facts */
    .memory-facts { display: flex; flex-direction: column; gap: 0.3rem; }
    .fact-item {
      padding: 0.4rem 0.5rem; background: var(--bg-card); border-radius: var(--radius-sm);
      font-size: 0.78rem; color: var(--text); border: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .fact-item .fact-type { font-size: 0.65rem; color: var(--cyan); font-family: var(--font-mono); text-transform: uppercase; }
    .fact-item .fact-content { flex: 1; }

    /* Policy checks */
    .policy-checks { display: flex; flex-direction: column; gap: 0.3rem; }
    .policy-check {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem;
    }
    .policy-check.safe { color: var(--success); }
    .policy-check.warn { color: var(--warning); }
    .policy-check.block { color: var(--error); }

    /* MCP activity mini-log */
    .mcp-mini-log { display: flex; flex-direction: column; gap: 0.2rem; max-height: 200px; overflow-y: auto; }
    .mcp-mini-entry {
      display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem;
      padding: 0.2rem 0.4rem; border-radius: 4px;
    }
    .mcp-mini-entry.start { color: var(--text-dim); }
    .mcp-mini-entry.complete { color: var(--cyan); }
    .mcp-mini-entry .mcp-server { color: var(--pink); font-family: var(--font-mono); }
    .mcp-mini-entry .mcp-tool { color: var(--cyan); font-family: var(--font-mono); font-weight: 600; }

    /* ============ VOICE UI ============ */
    .voice-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border);
      background: var(--bg-card); color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      transition: all 0.2s ease; flex-shrink: 0;
    }
    .voice-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .voice-btn.listening {
      border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1);
      animation: pulse-mic 1.5s ease-in-out infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    }
    .voice-btn.speaking {
      border-color: var(--cyan); color: var(--cyan); background: rgba(34, 211, 238, 0.1);
      animation: pulse-speak 1s ease-in-out infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(34, 211, 238, 0); }
    }
    .voice-status {
      font-size: 0.72rem; color: var(--text-dim); text-align: center;
      padding: 0.3rem 0; min-height: 1.4rem;
    }
    .voice-status.active { color: var(--error); font-weight: 600; }
    .voice-status.speaking { color: var(--cyan); font-weight: 600; }
    .voice-indicator {
      display: flex; align-items: center; gap: 0.4rem; padding: 0 1.5rem;
    }
    .voice-wave {
      display: flex; align-items: center; gap: 2px; height: 20px;
    }
    .voice-wave .bar {
      width: 3px; background: var(--cyan); border-radius: 2px;
      animation: wave-bar 0.8s ease-in-out infinite;
    }
    .voice-wave .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
    .voice-wave .bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .voice-wave .bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
    .voice-wave .bar:nth-child(4) { height: 14px; animation-delay: 0.3s; }
    .voice-wave .bar:nth-child(5) { height: 8px; animation-delay: 0.4s; }
    @keyframes wave-bar {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }
    .voice-wave.listening .bar { background: var(--error); }
    .voice-settings {
      display: flex; gap: 0.5rem; align-items: center; font-size: 0.75rem; color: var(--text-dim);
      padding: 0.4rem 1.5rem; border-top: 1px solid var(--border);
    }
    .voice-settings select {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      border-radius: 4px; padding: 0.2rem 0.4rem; font-size: 0.72rem;
    }
    .voice-toggle {
      display: flex; align-items: center; gap: 0.3rem; cursor: pointer;
    }
    .voice-toggle input { accent-color: var(--cyan); }
    .jarvis-badge {
      font-size: 0.65rem; background: rgba(34, 211, 238, 0.15); color: var(--cyan);
      padding: 0.15rem 0.5rem; border-radius: 10px; font-weight: 600; letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .arena { grid-template-columns: 1fr; }
      .arena-log { max-height: 300px; border-left: none; border-top: 1px solid var(--border); }
      .brain-view { grid-template-columns: 1fr; }
      .brain-sidebar { max-height: 300px; border-left: none; border-top: 1px solid var(--border); }
      .tasks-grid { grid-template-columns: 1fr; }
      .landing-header h1 { font-size: 2rem; }
    }
  </style>
</head>

  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
